<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 2rem;
      background-color: #f5f7fa;
      color: #333;
    }
    h1 {
      color: #0b2c5a;
    }
    .logo {
      width: 100px;
      margin: 1rem auto;
    }
    p {
      font-size: 1.2rem;
    }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background-color: #0b2c5a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    .retry:hover {
      background-color: #3a76e9;
    }
  </style>
</head>
<body>
  <img src="/icons/icon-192x192.png" alt="CTransit Logo" class="logo">
  <h1>You are offline</h1>
  <p>It seems you are not connected to the internet. Please check your connection and try again.</p>
  <button class="retry" onclick="location.reload()">Retry</button>
</body>
</html>
